[gcode_shell_command start_webcams]
command: /home/rpi/scripts/control_webcam.sh start
timeout: 5.
verbose: True

[gcode_macro START_WEBCAMS]
gcode:
    RUN_SHELL_COMMAND CMD=start_webcams
    RUN_SHELL_COMMAND CMD=start_nozzlecam


[gcode_shell_command stop_webcams]
command: /home/rpi/scripts/control_webcam.sh stop
timeout: 5.
verbose: True

[gcode_macro STOP_WEBCAMS]
gcode:
    RUN_SHELL_COMMAND CMD=stop_webcams
    
    
    
[gcode_shell_command start_nozzlecam]
command: /home/rpi/scripts/control_nozzlecam.sh start
timeout: 5.
verbose: True

[gcode_macro START_NOZZLECAM]
gcode:
    RUN_SHELL_COMMAND CMD=start_nozzlecam
    
    

[gcode_shell_command stop_nozzlecam]
command: /home/rpi/scripts/control_nozzlecam.sh stop
timeout: 5.
verbose: True

[gcode_macro STOP_NOZZLECAM]
gcode:
    RUN_SHELL_COMMAND CMD=stop_nozzlecam
    
    
[gcode_shell_command AUX_ON]
command: python /home/rpi/scripts/AUX_ON.py
timeout: 5.
verbose: True

[gcode_macro AUX_ON]
gcode:
    RUN_SHELL_COMMAND CMD=AUX_ON
    
    
[gcode_shell_command AUX_OFF]
command: python /home/rpi/scripts/AUX_OFF.py
timeout: 5.
verbose: True

[gcode_macro AUX_OFF]
gcode:
    RUN_SHELL_COMMAND CMD=AUX_OFF
