#####################################
#              PRINTER              #
#####################################
[include mainsail.cfg]
#[include adxl.cfg] # Comment this out when you disconnect the accelerometer

[printer]
kinematics: cartesian
max_velocity: 250
max_accel: 950
#max_accel_to_decel: 850
max_z_velocity: 20
max_z_accel: 100
square_corner_velocity: 1

[input_shaper]

shaper_freq_x: 23

shaper_type_x: mzv

shaper_freq_y: 29

shaper_type_y: ei

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[temperature_sensor HOST]
sensor_type: temperature_host

[temperature_sensor MCU]
sensor_type: temperature_mcu

[virtual_sdcard]
path: ~/printer_data/gcodes

[gcode_arcs]
resolution: 0.01

[display_status]

[pause_resume] 

[respond]


#####################################
#        Heater Verification        #
#####################################
[verify_heater heater_bed]
max_error: 120
check_gain_time: 30
hysteresis: 5
heating_gain: 2

[verify_heater extruder]
max_error: 120
check_gain_time: 30
hysteresis: 5
heating_gain: 2


