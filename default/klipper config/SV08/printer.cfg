
[stepper_x]
step_pin: PF0
dir_pin: PF1
enable_pin: !PD7
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PE5
position_endstop: -12.75
position_min: -12.75
position_max: 300
homing_speed: 30

[stepper_y]
step_pin: PF6
dir_pin: PF7
enable_pin: !PF2
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PJ1
position_endstop: 0
position_max: 300
homing_speed: 30
homing_positive_dir: false

[stepper_z]
step_pin: PL3
dir_pin: !PL1
enable_pin: !PK0
microsteps: 16
rotation_distance: 8
endstop_pin: ^!PD3
position_endstop: 0
position_min: -3
position_max: 400
homing_speed: 14
second_homing_speed: 10

[stepper_z1]
step_pin: PC1
dir_pin: !PC3
enable_pin: !PC7
microsteps: 16
rotation_distance: 8

[extruder]
step_pin: PA4
dir_pin: !PA6
enable_pin: !PA2
microsteps: 16
rotation_distance: 6.939 
##rotation distance 7.710 original value##
nozzle_diameter: 0.400
pressure_advance: 0.06
pressure_advance_smooth_time: 0.040
filament_diameter: 1.75
heater_pin: PB4
sensor_type: PT1000
sensor_pin: PK5
min_extrude_temp: 190
min_temp: 5
max_temp: 450
max_extrude_only_distance: 500
max_extrude_cross_section: 0.64

[heater_bed]
heater_pin: PH5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK6
min_temp: 5
max_temp: 150

[idle_timeout]
timeout: 3600

[fan]
pin: PH6
kick_start_time: 0.600

[heater_fan HeaterFan heater_fan]
pin: PH4
heater: extruder
heater_temp: 50.0
fan_speed: 1.0

[mcu]
#make sure this reflects your serial port you found when flashing klipper
serial: /dev/serial/by-id/usb-1a86_USB2.0-Serial-if00-port0

[printer]
kinematics: cartesian
max_velocity: 200
max_accel: 750
max_accel_to_decel: 750
max_z_velocity: 20
max_z_accel: 100
square_corner_velocity: 10 

[bed_screws]
screw1: 55,55
screw1_name: front left
screw2: 255,55
screw2_name: front right
screw3: 255,255
screw3_name: back right
screw4: 55,255
screw4_name: back left
speed: 100.0


[display_status]

[virtual_sdcard]
path: ~/gcode_files

[include sample-makros.cfg]

### LED ###
[output_pin LED_pin_red]
pin: PE3
pwm: True
value: 0
cycle_time: 0.010
[output_pin LED_pin_green]
pin: PG5
pwm: True
value: 0
cycle_time: 0.010
[output_pin LED_pin_blue]
pin: PH3
pwm: True
value: 0
cycle_time: 0.010


