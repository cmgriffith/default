[gcode_macro CLEAN_NOZZLE]
gcode:
# should have conditionals to check extruder temperature and position
  # Use absolute coordinates
    G90
    # extruder temp
    RESPOND MSG="clean nozzle macro"
    M104 S{params.EXTRUDER_TEMP} ; set extruder temp
    G1 X290 Y300 Z10 F5000 ; move to prime location
    RESPOND MSG="waiting for extruder heat"
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={params.EXTRUDER_TEMP} ; wait for extruder to trigger
    G1 X290 Y300 Z1 F1000 ; move to prime location
    G92 E0 ; Reset Extruder
# Move the nozzle very close to the bed
    G1 X280 Y305.5 Z0.3 F3000			   
    # prime nozzle
    G1 X125 F1500 E15
    # fast wipe to release pressure
    G1 X100 Z0.2 E-5 F3000.0			
    # move to wipe zone start
    G1 Z4 F3000
    G1 X35 F3000
    # wipe nozzle across X wile wiggling in Y
    G1 X34 Y308.5 F1500
    G1 X25 Y302.5 F1500
    G1 X20 Y308 F1500
    G1 X15 Y303 F1500
    G1 X10 Y308 F1500
    G1 X5 Y303 F1500
    G1 X0 Y308 F1500
    # wipe cone while small wiggling in Y
    G1 X5 Y303 Z3.5 F1000
    G1 X10 Y308 Z3 F1000
    G1 X15 Y303 Z3 F1000
    G1 X20 Y308 Z3 F1000 # can go lower here later... 
    G1 Z10 F1500 # z hop to safe height
    # safely leave wipe zone and lower to print height
    G1 X75 F3000
    G1 X80 Y290 Z1 F1500


[gcode_macro PRINT_START]
gcode:
    AUX_ON
    # # BLTOUCH_DEBUG COMMAND=reset
    # START_WEBCAMS
    # GCODE_AT_LAYER LAYER=3 COMMAND=STOP_NOZZLECAM
    RESPOND MSG="starting print"
  
    {% set EXTRUDER_PREHEAT = params.EXTRUDER_TEMP|int - 25 %}
    {% set BED_PREHEAT = params.BED_TEMP|int - 25 %}

    M104 S{params.EXTRUDER_TEMP} ; no wait
    M140 S{params.BED_TEMP} ; no wait
    RESPOND MSG="waiting for preheats"
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER_PREHEAT} ; wait for extruder filament to be in soft state
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED_PREHEAT} ; wait for bed to reach preheat
    RESPOND MSG="homing axis"
    # # BLTOUCH_DEBUG COMMAND=reset
    G21 ; set units to millimeters    
    G90 ; use absolute coordinates 
    M83 ; use relative distances for extrusion
    G28 ; home all axis
    RESPOND MSG="calibrating bed mesh"
    # # BED_MESH_CALIBRATE ADAPTIVE=1
    # BED_MESH_PROFILE LOAD="mesh1"
    CLEAN_NOZZLE EXTRUDER_TEMP={params.EXTRUDER_TEMP}
    G21 ; set units to millimeters
    G90 ; use absolute coordinates
    M83 ; use relative distances for extrusion
    G92 E0
    RESPOND MSG="done."
    RESPOND MSG="printing..."

[gcode_macro PRINT_END]
gcode:
    # Turn off bed, extruder, and fan
    M140 S0
    M104 S0
    M106 S0
    # Move nozzle away from print while retracting
    G91
    G1 X-2 Y-2 E-5 F500
    G1 Z25 F3000     # Raise nozzle
    G1 Z100 F3000     # Raise nozzle

    G90
    # G1 X280 Y300 F5000 ; present bed
    # Disable steppers
    M84
    AUX_OFF
    STOP_WEBCAMS


