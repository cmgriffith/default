# This file contains common pin mappings for MKS Robin Nano (v1.2.004)
# boards. To use this config, the firmware should be compiled for the
# STM32F103. When running "make menuconfig", enable "extra low-level
# configuration setup", select the 28KiB bootloader, disable "USB for
# communication", and select USART3 for the "Serial Port".

# Note that the "make flash" command does not work with MKS Robin
# boards. After running "make", run the following command:
#   ./scripts/update_mks_robin.py out/klipper.bin out/Robin_nano.bin
# Copy the file out/Robin_nano.bin to an SD card and then restart the
# printer with that SD card.

# See the example.cfg file for a description of available parameters.

[include mainsail.cfg]

[include macro.cfg]

[mcu]
# serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
serial: /dev/serial/by-path/platform-3f980000.usb-usb-0:1.3:1.0-port0
restart_method: command

# [virtual_sdcard]
# path: ~/gcode_files

[stepper_x]
step_pin: PE3
dir_pin: !PE2
enable_pin: !PE4
rotation_distance: 40
microsteps: 32
endstop_pin: ^!PA15
position_endstop: 0
position_max: 310
homing_speed: 50
homing_retract_dist: 2.0
homing_retract_speed: 40
second_homing_speed: 10


[stepper_y]
step_pin: PE0
dir_pin: !PB9
enable_pin: !PE1
rotation_distance: 40
full_steps_per_rotation: 200
microsteps: 32
endstop_pin: ^PA12
position_endstop: 0
position_max: 310
homing_speed: 50
homing_retract_dist: 2.0
homing_retract_speed: 40
second_homing_speed: 10


[stepper_z]
step_pin: PB5
dir_pin: PB4
enable_pin: !PB8
rotation_distance: 8
full_steps_per_rotation: 200
microsteps: 32
endstop_pin: ^!PA11 # probe:z_virtual_endstop #defines the Z endstop as the BLtouch
#position_endstop: 0
position_min: -2 #lets us go lower to adjust the Z offset
position_max: 200
homing_speed: 20
homing_retract_dist: 2
homing_retract_speed: 10
second_homing_speed: 5

[stepper_z1]
step_pin: PA6
dir_pin: !PA1
enable_pin: !PA3
microsteps: 16
rotation_distance: 8
full_steps_per_rotation: 200

[safe_z_home]
home_xy_position: 121,185
speed: 200
z_hop: 20
z_hop_speed: 50

# [homing_override]
# axes: xyz
# set_position_z: 0
# gcode:
#     G91                ; Relative positioning
#     G0 Z10 F600        ; Move toolhead up 10mm
#     G28 Y              ; Home Y first
#     G28 X              ; Home X second
#     G90                ; Absolute positioning
#     G0 X150 Y150 F9000 ; Move to center of bed
#     G28 Z              ; Home Z last

#[probe]
##pin: ^!PA11
#x_offset: -40
#y_offset: 0
#z_offset: 0
#speed: 20

[probe]
pin: ^!PC4
x_offset: -38.0
y_offset: -20.0
z_offset: 0
speed: 10.0 ; of z axis probe
lift_speed: 50.0
sample_retract_dist: 1
samples: 2
samples_result: average
samples_tolerance: 0.01
samples_tolerance_retries: 3

#[bed_mesh]
#speed: 150
#horizontal_move_z: 5
#mesh_min: 30,30
#mesh_max: 170,175
#probe_count: 3,3 #performs a 3x3 bed leveling test 

[extruder]
step_pin: PD6
dir_pin: !PD3
enable_pin: !PB3
rotation_distance: 7.711
full_steps_per_rotation: 200
microsteps: 32
max_extrude_only_distance: 150.0
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC3
sensor_type: 3950 # ATC Semitec 104GT-2
sensor_pin: PC1
#control: pid
#pid_Kp: 14.669
#pid_Ki: 0.572
#pid_Kd: 94.068
min_temp: 0
max_temp: 280
pressure_advance: 0.08

[thermistor 3950]
temperature1: 25.0
resistance1: 103180.0
temperature2: 150.0
resistance2: 1366.2
temperature3: 250.0
resistance3: 168.6

[input_shaper]
shaper_freq_x: 33.5
shaper_freq_y: 42.1
shaper_type: mzv

[heater_fan my_nozzle_fan]
pin: PB0
heater: extruder
heater_temp: 50.0
fan_speed: 1.0

[heater_bed]
heater_pin: PA0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC0
#control: pid
#pid_Kp: 325.10
#pid_Ki: 63.35
#pid_Kd: 417.10
min_temp: 0
max_temp: 130

[fan]
pin: PB1

[printer]
kinematics: cartesian
max_velocity: 250
max_accel: 2000
max_z_velocity: 25
max_z_accel: 100

[static_digital_output display_reset]
pins: !PC6, !PD13

[pause_resume]
recover_velocity: 50

[gcode_arcs]
resolution: 0.1

